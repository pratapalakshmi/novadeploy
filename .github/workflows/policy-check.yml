name: Policy checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  kube-linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kube-linter
        run: |
          curl -sSL https://github.com/stackrox/kube-linter/releases/latest/download/kube-linter-linux-amd64 -o kube-linter
          chmod +x kube-linter
          sudo mv kube-linter /usr/local/bin

      - name: Run kube-linter on manifests
        run: |
          kube-linter lint platform apps --config .kube-linter.yaml

