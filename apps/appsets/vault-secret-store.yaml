apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vault-secret-store
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  generators:
    - list:
        elements:
          - env: dev
            server: https://kubernetes.default.svc
          # - env: prod
          #   server: https://<PROD_CLUSTER_API_URL>
  template:
    metadata:
      name: "vault-secret-store-{{env}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "3"
    spec:
      project: default
      source:
        repoURL: git@github.com:pratapalakshmi/novadeploy.git
        targetRevision: main
        path: platform/external-secrets
        directory:
          include: vault-secret-store.yaml
      destination:
        server: "{{server}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true

