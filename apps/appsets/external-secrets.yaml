apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  generators:
    - list:
        elements:
          - env: dev
            server: https://kubernetes.default.svc
          - env: prod
            server: https://<PROD_CLUSTER_API_URL>
  template:
    metadata:
      name: "external-secrets-{{env}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: default
      sources:
        - repoURL: https://charts.external-secrets.io
          chart: external-secrets
          targetRevision: "0.15.1"
          helm:
            releaseName: external-secrets
            valueFiles:
              - $values/platform/external-secrets/values.yaml
        - repoURL: git@github.com:pratapalakshmi/novadeploy.git
          targetRevision: main
          ref: values
      destination:
        server: "{{server}}"
        namespace: external-secrets
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true

