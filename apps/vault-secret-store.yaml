# Deploys ClusterSecretStore (ESO → Vault) after ESO is ready (wave 3).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-secret-store
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: git@github.com:pratapalakshmi/novadeploy.git
    targetRevision: main
    path: platform/external-secrets
    directory:
      include: vault-secret-store.yaml
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
