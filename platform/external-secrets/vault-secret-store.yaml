# ClusterSecretStore for Vault. Requires Secret "vault-token" in namespace "external-secrets"
# with key "token" containing the Vault token (e.g. root in dev mode).
# Create with: kubectl create secret generic vault-token --from-literal=token=root -n external-secrets
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: "vault-token"
          namespace: "external-secrets"
          key: "token"
