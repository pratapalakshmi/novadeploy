apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: python-app
          image: novadeploy/python-app:latest
          imagePullPolicy: Never
          securityContext:
            readOnlyRootFilesystem: true
          command:
            - python
            - -m
            - uvicorn
            - main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-config
                  key: db_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-config
                  key: db_password
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: app-config
                  key: db_host
            - name: DATABASE_URL
              value: postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):5432/demo
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

