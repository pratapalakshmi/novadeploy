# nginx Deployment using app-config secret; Stakater Reloader restarts on secret change.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: demo
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          env:
            - name: APP_NAME
              valueFrom:
                secretKeyRef:
                  name: app-config
                  key: appname
